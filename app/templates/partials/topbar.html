<header class="topbar">
    <div class="topbar__intro">
        <nav class="topbar__breadcrumbs" aria-label="Breadcrumb">
            <ol>
                {% for crumb in breadcrumbs | default(['Workspace', page_title]) %}
                    <li class="{% if loop.last %}is-current{% endif %}">{{ crumb }}</li>
                {% endfor %}
            </ol>
        </nav>
        <div class="topbar__heading">
            <p class="topbar__eyebrow">{{ deployment_label | default('Despliegue local') }}</p>
            <h1 class="topbar__title">{{ page_title }}</h1>
            <p class="topbar__subtitle">{{ page_subtitle | default('Operación documental sobre prepólizas Word.') }}</p>
        </div>
    </div>

    <div class="topbar__meta">
        <button class="btn btn--tertiary topbar__logout" type="button" data-logout-button>Cerrar sesión</button>
    </div>
</header>
