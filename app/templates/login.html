{% extends "base.html" %}

{% block content %}
<section class="login-card card card--state">
    <div class="login-card__header card__header-copy">
        <p class="login-card__eyebrow card__eyebrow">Acceso interno</p>
        <h1 class="card__title">Iniciar sesión</h1>
        <p class="card__description">Accede al entorno corporativo para registrar, procesar y dar seguimiento a prepólizas Word.</p>
    </div>

    <form class="login-form" action="#" method="post" data-login-form>
        <label class="field form-field">
            <span class="form-field__label">Usuario</span>
            <input class="form-control" type="text" name="username" placeholder="usuario.corporativo" autocomplete="username" required>
        </label>

        <label class="field form-field">
            <span class="form-field__label">Contraseña</span>
            <input class="form-control" type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        </label>

        <button class="primary-button btn btn--primary" type="submit" data-login-submit-button>Acceder</button>
    </form>
    <p class="form-feedback alert alert--info" data-login-feedback aria-live="polite" role="status"></p>

    <div class="login-card__footer">
        <span>Sesión protegida</span>
        <span>Procesamiento interno</span>
        <span>FastAPI</span>
    </div>
</section>
{% endblock %}
